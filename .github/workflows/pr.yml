name: Pull Request Validation

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  id-token: write
  contents: read

jobs:
  validate:

    uses: divyasingh0/az_tf_workflow/.github/workflows/terraform_pr.yml@v1.0.0

    with:
      environment: ${{ vars.TF_ENVIRONMENT }}
      working_directory: .

    secrets: inherit