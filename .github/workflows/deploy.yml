name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        required: true
        type: choice
        options:
          - dev
          - test
          - prod

jobs:
  deploy:
    uses: divyasingh0/az_tf_workflow/.github/workflows/terraform-application.yml@main

    with:
      environment: ${{ github.event.inputs.environment }}

    secrets: inherit